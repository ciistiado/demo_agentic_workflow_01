name: Publish PowerBI MCP Container

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/publish-powerbi-mcp-container.yml'

permissions:
  packages: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push PowerBI MCP image
        run: |
          docker buildx build \
            --push \
            --tag ghcr.io/kerski/powerbi-modeling-mcp:latest \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            - <<'DOCKERFILE'
          FROM node:20-slim
          RUN apt-get update \
            && apt-get install -y --no-install-recommends libicu-dev ca-certificates \
            && rm -rf /var/lib/apt/lists/*
          RUN npm install -g @microsoft/powerbi-modeling-mcp
          ENTRYPOINT ["node", "-e", "const os=require('os');const r=require('child_process').execSync('npm root -g',{stdio:['pipe','pipe','ignore']}).toString().trim();require(r+'/@microsoft/powerbi-modeling-mcp/node_modules/@microsoft/powerbi-modeling-mcp-'+os.platform()+'-'+os.arch()).runExecutable(['--start','--skipconfirmation']).then(c=>process.exit(c));"]
          DOCKERFILE
